name: phantom
port: 3100
role: swe
model: claude-sonnet-4-6
inference:
  mode: auto
  local_model: llama3.1:8b
  local_complexity_threshold: 500
  local_timeout_ms: 30000
effort: max
max_budget_usd: 0
timeout_minutes: 240

# Per-channel role assignment.
# Keys are matched against the conversationId prefix (e.g. "discord:") and then
# against the channelId (e.g. "slack"). First match wins.
channel_roles:
  discord: social
  slack: swe

